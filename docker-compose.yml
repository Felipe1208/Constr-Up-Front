version: '3.8'

services:
  construp-front:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: construp-front
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:8080/api}
    restart: unless-stopped
